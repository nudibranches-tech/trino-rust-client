coordinator=true
node-scheduler.include-coordinator=true

# Required whenever any authentication type is enabled (signs internal requests).
# Any fixed value works for this single-node local stack.
internal-communication.shared-secret=trino-oauth-local-shared-secret

# Internal discovery/liveness stays on plain http (8080, container-internal);
# the client-facing endpoint is https (8443) where OAuth2 is enforced. This
# avoids self-signed internal-TLS trust issues for a single-node coordinator.
http-server.http.enabled=true
http-server.http.port=8080
http-server.https.enabled=true
http-server.https.port=8443
http-server.https.keystore.path=/etc/trino/certs/keystore.p12
http-server.https.keystore.key=changeit
discovery.uri=http://coordinator:8080

# Interactive OAuth2 (Authorization Code flow, coordinator-mediated).
http-server.authentication.type=oauth2
web-ui.authentication.type=oauth2
http-server.authentication.oauth2.issuer=http://keycloak:8080/realms/trino
http-server.authentication.oauth2.auth-url=http://keycloak:8080/realms/trino/protocol/openid-connect/auth
http-server.authentication.oauth2.token-url=http://keycloak:8080/realms/trino/protocol/openid-connect/token
http-server.authentication.oauth2.jwks-url=http://keycloak:8080/realms/trino/protocol/openid-connect/certs
http-server.authentication.oauth2.client-id=trino
http-server.authentication.oauth2.client-secret=trino-secret
http-server.authentication.oauth2.principal-field=preferred_username
http-server.authentication.oauth2.scopes=openid
